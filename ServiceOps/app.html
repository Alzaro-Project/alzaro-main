<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alzaro ServiceOps — Field Service Operations Infrastructure</title>
  <meta name="description" content="The operating system for UK tradespeople — quotes, jobs, invoicing and compliance." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{
      --bg:#0b0b0e; --panel:#141418; --panel-2:#16161b; --line:rgba(255,255,255,.07);
      --line-2:rgba(255,255,255,.12); --txt:#ececf0; --txt-2:#9a9aa3; --txt-3:#6b6b75;
      --brand:#22c55e; --brand-soft:rgba(34,197,94,.15);
      --green:#5dcaa5; --green-soft:rgba(93,202,165,.15);
      --amber:#ef9f27; --amber-soft:rgba(239,159,39,.15);
      --red:#f0807b; --red-soft:rgba(226,75,74,.15);
      --blue:#85b7eb; --blue-soft:rgba(55,138,221,.15);
      --radius:12px; --radius-sm:8px;
    }
    *{box-sizing:border-box; margin:0; padding:0;}
    html,body{background:var(--bg); color:var(--txt); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}
    body.light{
      --bg:#f4f4f6; --panel:#ffffff; --panel-2:#ffffff; --line:rgba(0,0,0,.08);
      --line-2:rgba(0,0,0,.14); --txt:#16161b; --txt-2:#55555f; --txt-3:#8a8a93;
      --brand-soft:rgba(34,197,94,.12); --green-soft:rgba(29,158,117,.12);
      --amber-soft:rgba(186,117,23,.12); --red-soft:rgba(216,90,48,.12); --blue-soft:rgba(55,138,221,.12);
    }
    h1,h2,h3,.brand{font-family:'Sora',sans-serif;}
    ::-webkit-scrollbar{width:8px;height:8px;}
    ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px;}
    a{color:inherit;text-decoration:none;}
    .fade-in{animation:fade .5s ease both;}
    @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="supabase.js"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>
</body>
</html>
