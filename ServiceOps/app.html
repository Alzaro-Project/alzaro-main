<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alzaro ServiceOps — Field Service Operations Infrastructure</title>
  <meta name="description" content="The operating system for UK tradespeople — quotes, jobs, invoicing and compliance." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"></script>
  <style>
    :root{
      --bg:#0d0d10; --panel:#16161a; --panel-2:#16161a; --line:rgba(255,255,255,.09);
      --line-2:rgba(255,255,255,.14); --txt:#f0f0f0; --txt-2:#9090a0; --txt-3:#606070;
      --brand:#3dd68c; --brand-soft:rgba(61,214,140,.13);
      --green:#3dd68c; --green-soft:rgba(61,214,140,.15);
      --amber:#fbbf24; --amber-soft:rgba(251,191,36,.15);
      --red:#ff5f5f; --red-soft:rgba(255,95,95,.15);
      --blue:#60a5fa; --blue-soft:rgba(96,165,250,.15);
      --purple:#a78bfa; --purple-soft:rgba(167,139,250,.15);
      --teal:#2dd4bf; --teal-soft:rgba(45,212,191,.15);
      --surface2:#1e1e24; --surface3:#26262e;
      --radius:14px; --radius-sm:8px;
    }
    *{box-sizing:border-box; margin:0; padding:0;}
    html,body{background:var(--bg); color:var(--txt); font-family:'Plus Jakarta Sans',sans-serif; -webkit-font-smoothing:antialiased;}
    body.light{
      --bg:#f4f5f7; --panel:#ffffff; --panel-2:#ffffff; --line:#d8dce4;
      --line-2:#c4cad4; --txt:#111318; --txt-2:#4b5263; --txt-3:#8b92a5;
      --brand:#15a34a; --brand-soft:rgba(21,163,74,.1);
      --green:#15a34a; --green-soft:rgba(21,163,74,.12);
      --amber:#d97706; --amber-soft:rgba(217,119,6,.12);
      --red:#dc2626; --red-soft:rgba(220,38,38,.1);
      --blue:#2563eb; --blue-soft:rgba(37,99,235,.12);
      --purple:#7c3aed; --purple-soft:rgba(124,58,237,.12);
      --teal:#0d9488; --teal-soft:rgba(13,148,136,.12);
      --surface2:#eef0f4; --surface3:#e2e5eb;
    }
    h1,h2,h3,.brand,.font-head{font-family:'Syne',sans-serif;}
    .mono{font-family:'DM Mono',monospace;}
    ::-webkit-scrollbar{width:8px;height:8px;}
    ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px;}
    a{color:inherit;text-decoration:none;}
    .fade-in{animation:fade .5s ease both;}
    @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
    /* dark-mode-safe form controls (fixes invisible date pickers) */
    html{color-scheme:dark;}
    body.light{color-scheme:light;}
    input,select,textarea{color:var(--txt); background:var(--panel-2); font-family:'Plus Jakarta Sans',sans-serif;}
    body:not(.light) input[type="date"],
    body:not(.light) input[type="time"]{color-scheme:dark !important;}
    body.light input[type="date"],
    body.light input[type="time"]{color-scheme:light !important;}
    select option{background:var(--panel); color:var(--txt);}
    @media (max-width: 768px){
      /* stack all multi-column form grids into one column */
      [style*="grid-template-columns"]{ grid-template-columns: 1fr !important; }
      /* let stat-card rows wrap instead of squashing */
      [style*="gap: 12px"]{ flex-wrap: wrap; }
      [style*="flex: 1 1 0%"]{ min-width: 46%; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="supabase.js"></script>
  <script type="text/babel" data-presets="react" src="Dashboard.jsx"></script>
</body>
</html>
