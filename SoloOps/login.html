<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alzaro SoloOps — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#0a0908;--surface:#121110;--surface2:#1a1816;--surface3:#23201d;--border:rgba(255,255,255,.06);--text:#faf9f7;--text2:#a8a29e;--text3:#68635d;--orange:#f97316;--amber:#f59e0b;--red:#ef4444;--green:#22c55e;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:420px;max-width:100%;}
.brand{font-size:32px;font-weight:800;text-align:center;margin-bottom:6px;letter-spacing:-.5px;}
.brand span{color:var(--orange);}
.sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:24px;}
.tabs{display:flex;gap:6px;background:var(--surface2);border-radius:8px;padding:4px;margin-bottom:20px;}
.tab{flex:1;padding:8px;text-align:center;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);}
.tab.active{background:var(--surface3);color:var(--text);}
input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;width:100%;margin-bottom:12px;font-family:inherit;}
button.go{background:linear-gradient(135deg,var(--orange),var(--amber));color:#000;font-weight:700;font-size:14px;padding:13px;border-radius:8px;border:none;cursor:pointer;width:100%;}
button.go:disabled{opacity:.6;}
.link{background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;padding:8px;width:100%;margin-top:4px;}
.msg{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red);}
.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green);}
.foot{font-size:11px;color:var(--text3);}
.hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">Alzaro <span>SoloOps</span></div>
    <div class="sub">Business Operations for Sole Traders</div>
    <div class="tabs">
      <div class="tab active" id="tabLogin">Login</div>
      <div class="tab" id="tabReg">Register Business</div>
    </div>
    <div id="msg"></div>
    <div id="loginForm">
      <input type="email" id="lEmail" placeholder="Email address" />
      <input type="password" id="lPass" placeholder="Password" />
      <button class="go" id="btnLogin">Sign In</button>
      <button class="link" id="btnForgot">Forgot password?</button>
    </div>
    <div id="regForm" class="hidden">
      <input type="text" id="rBiz" placeholder="Business name *" />
      <input type="email" id="rEmail" placeholder="Email address *" />
      <input type="password" id="rPass" placeholder="Password (min 6 characters) *" />
      <button class="go" id="btnReg">Start Free Trial</button>
      <div class="foot" style="text-align:center;margin-top:8px;">No credit card required · Cancel anytime</div>
    </div>
  </div>
  <div class="foot">Alzaro SoloOps · Business Management SaaS · v1.0</div>
</div>

<script src="supabase.js"></script>
<script>
(function(){
  var ADMIN=['mohammmed250052@gmail.com'];
  var $=function(id){return document.getElementById(id);};
  var go=function(p){window.location.href=p;};
  var setMsg=function(t,cls){ $('msg').innerHTML = t? '<div class="msg '+cls+'">'+t+'</div>' : ''; };

  $('tabLogin').onclick=function(){ $('tabLogin').classList.add('active'); $('tabReg').classList.remove('active'); $('loginForm').classList.remove('hidden'); $('regForm').classList.add('hidden'); setMsg(''); };
  $('tabReg').onclick=function(){ $('tabReg').classList.add('active'); $('tabLogin').classList.remove('active'); $('regForm').classList.remove('hidden'); $('loginForm').classList.add('hidden'); setMsg(''); };

  $('btnLogin').onclick=async function(){
    var email=$('lEmail').value.trim(), pass=$('lPass').value;
    if(!email||!pass){ setMsg('Please enter email and password','err'); return; }
    $('btnLogin').disabled=true; setMsg('');
    try{
      var r=await window.sb.auth.signInWithPassword({email:email,password:pass});
      if(r.error) throw r.error;
      if(ADMIN.indexOf(email.toLowerCase())>=0){ go('/soloops/admin'); return; }
      var a=await window.sb.from('soloops_access').select('user_id').eq('user_id',r.data.user.id).maybeSingle();
      if(!a.data){
        if(r.data.user.user_metadata && r.data.user.user_metadata.product==='soloops'){
          await window.sb.from('soloops_access').insert({email:r.data.user.email,user_id:r.data.user.id,business_name:(r.data.user.user_metadata.business_name||null)});
          go('/soloops/dashboard'); return;
        }
        setMsg('This login has no SoloOps access yet. Use Register to start a trial.','err');
        $('btnLogin').disabled=false; return;
      }
      go('/soloops/dashboard');
    }catch(e){
      var m=e.message||'Login failed';
      if(/invalid login credentials/i.test(m)) m='Email or password is incorrect. New here? Use Register.';
      setMsg(m,'err'); $('btnLogin').disabled=false;
    }
  };

  $('btnForgot').onclick=async function(){
    var email=$('lEmail').value.trim();
    if(!email){ setMsg('Enter your email first','err'); return; }
    var base=location.hostname==='localhost'?'http://localhost:5173':location.protocol+'//'+location.host;
    try{ var r=await window.sb.auth.resetPasswordForEmail(email,{redirectTo:base+'/soloops/reset-password'}); if(r.error) throw r.error; setMsg('Reset link sent — check your email.','ok'); }
    catch(e){ setMsg(e.message||'Failed to send reset email','err'); }
  };

  $('btnReg').onclick=async function(){
    var biz=$('rBiz').value.trim(), email=$('rEmail').value.trim(), pass=$('rPass').value;
    if(!biz||!email||!pass){ setMsg('Please fill all fields','err'); return; }
    if(pass.length<6){ setMsg('Password must be at least 6 characters','err'); return; }
    $('btnReg').disabled=true; setMsg('');
    var base=location.hostname==='localhost'?'http://localhost:5173':location.protocol+'//'+location.host;
    try{
      var si=await window.sb.auth.signInWithPassword({email:email,password:pass});
      if(!si.error && si.data && si.data.user){
        var uid=si.data.user.id;
        var ex=await window.sb.from('soloops_access').select('user_id').eq('user_id',uid).maybeSingle();
        if(ex.data){ await window.sb.auth.signOut(); setMsg('You already have SoloOps — just log in.','ok'); $('tabLogin').onclick(); $('btnReg').disabled=false; return; }
        var ins=await window.sb.from('soloops_access').insert({user_id:uid,email:email.toLowerCase(),business_name:biz});
        if(ins.error) throw ins.error;
        go('/soloops/dashboard'); return;
      }
      var su=await window.sb.auth.signUp({email:email,password:pass,options:{emailRedirectTo:base+'/soloops/login',data:{business_name:biz,product:'soloops'}}});
      if(su.error) throw su.error;
      setMsg('Check your email to confirm your account, then log in.','ok'); $('tabLogin').onclick();
    }catch(e){ setMsg(e.message||'Registration failed','err'); $('btnReg').disabled=false; }
  };
})();
</script>
</body>
</html>
